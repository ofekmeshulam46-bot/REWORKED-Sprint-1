<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>MineSweeper</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>

  <body class="main-layout" onload="onInit()">
    <h2 class="main-header grid">
      <span class="score">Score:<span>000</span></span>
      <span class="lives"
        >Lives Remaining: <span class="lives-num"></span
      ></span>
      <span class="timer">000</span>
    </h2>

    <div class="board-container main-content">
      <tbody class="board"></tbody>
    </div>

    <!-- <button onclick="onInit()">Restart</button> -->
    <button
      class="reset-emoji"
      onclick="(stopTimer(), setTimerToZero(), onInit())"
    >
      <span></span>
    </button>

    <div class="difficulty-buttons">
      <button class="easy-level" onclick="setDifficulty(this)">Easy</button>
      <button class="medium-level" onclick="setDifficulty(this)">Medium</button>
      <button class="hard-level" onclick="setDifficulty(this)">Hard</button>
    </div>
    <div class="hint-icons">
      <span class="-hint hint-one dynamic" onclick="giveHint(this)"></span>
      <span class="-hint hint-two dynamic" onclick="giveHint(this)">
        <span></span>
      </span>
      <span class="-hint hint-three dynamic" onclick="giveHint(this)"></span>
    </div>
    <div class="main-modal">
      <h2><span>"you won!"</span></h2>
    </div>
    <div class="footer"></div>
    <footer></footer>
    <script src="js/utils.js"></script>
    <script src="js/mineSweeper.js"></script>
  </body>
</html>
